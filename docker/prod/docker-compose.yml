services:

  backend:
    build: ../../backend

    env_file:
      - ../../.env

    environment:
      APP_ENV: production
    #   MONGO_URI: ${MONGO_URI}
    #   DB_NAME: ${DB_NAME}

  mongodb:
    image: mongo:4.4

    env_file:
      - ../../.env

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

    volumes:
      - mongo-prod-data:/data/db
      - ../../mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js

  nginx:
    image: nginx:alpine

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - backend

volumes:
  mongo-prod-data: