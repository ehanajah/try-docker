services:

  backend:
    build: ../../backend

    env_file:
      - ../../.env

    environment:
      APP_ENV: production

  mongodb:
    image: mongo:4.4

    env_file:
      - ../../.env

    volumes:
      - mongo-prod-data:/data/db
      - ../../mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro
      # - ../../mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js

  nginx:
    image: nginx:alpine

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - backend

volumes:
  mongo-prod-data: