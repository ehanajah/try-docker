name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    # runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: |
          cd ~/apps/try-docker
          
          cat > .env <<'EOF'
          MONGO_ROOT_USERNAME=${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_DB=${{ vars.MONGO_DB }}
          DB_NAME=${{ vars.DB_NAME }}
          MONGO_APP_USERNAME=${{ secrets.MONGO_APP_USERNAME }}
          MONGO_APP_PASSWORD=${{ secrets.MONGO_APP_PASSWORD }}
          MONGO_URI=${{ secrets.MONGO_URI }}
          EOF
          
          git pull
          docker compose -f docker/prod/docker-compose.yml --env-file .env up -d --build

